<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Arrow Function</title>
</head>
<body>

	<script type="text/javascript">
		function myFun() {
			console.log("Normal Fucntion");
		}
		myFun();

		var varFun = function() {
			console.log("Varibale function");
		}
		varFun();

		var argFunction = function(name) {
			return console(`welcome ${name}`);
		}

		argFunction("Abdullah");

	</script>
</body>
</html>

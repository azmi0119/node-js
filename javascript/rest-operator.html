<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<body>

<script type="text/javascript">
	function sum(a, b) {
		console.log(a + b);
	}

	sum(34,22);

	// Using arguments oprator 
	function argSum() {
		sum = 0;
		for( let i in arguments) {
			sum += arguments[i];
		}
		console.log(sum);
	}
	argSum(34,23,25,22);


	// rest operator 
	function addition(name, ...args) {

		// name argument print here 
		document.write(`Hello ${name}`);

		sum = 0
		for(let i in args) {
			sum += args[i];
		}

		document.write(sum + "<br>");
	}

	addition("Abdullah",32,5,2);

</script>
</body>
</html>
